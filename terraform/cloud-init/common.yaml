#cloud-config
 
package_update: true
package_upgrade: false

packages:
  - openjdk-17-jdk-headless
  - python3
  - python3-pip
  - python3-venv
  - curl
  - wget
  - tar
  - unzip
  - git
  - jq

write_files:
  - path: /etc/profile.d/spark-lab.sh
    owner: root:root
    permissions: "0644"
    content: |
      export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      export PATH=$JAVA_HOME/bin:$PATH

  - path: /etc/spark-lab-node
    owner: root:root
    permissions: "0644"
    content: |
      This machine was bootstrapped by cloud-init.

runcmd:
  - python3 --version
  - java -version
  - mkdir -p /opt/spark
  - chmod 0755 /opt/spark
  - touch /var/log/spark-cloud-init-complete

final_message: |
  Spark node base bootstrap completed after $UPTIME seconds.